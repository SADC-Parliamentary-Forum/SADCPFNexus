# Development overlay — enables HMR polling for Docker Desktop / Windows.
# Volume mounts are already in docker-compose.yml (base file).
# Use with the base compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Required on Docker Desktop / Windows because inotify events don't cross the
# Hyper-V / WSL2 boundary — polling is used instead.

services:
  web:
    environment:
      # Required for file-change detection (HMR) on Docker Desktop / Windows
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
