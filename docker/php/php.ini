memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 300

; ── OPcache — tuned for WSL2 bind-mount (Windows filesystem stat calls are very slow)
; Disable timestamp validation: files are served from the in-memory bytecache without
; stat()-ing the underlying Windows FS on every request.  Run `kill -USR2 1` inside the
; php container after any PHP source change to reload the cache.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
