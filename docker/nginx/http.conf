# ── nginx http-context config — loaded inside http{} via conf.d include ────────
#
# Rate limiting zones
# ──────────────────
# api_global : 60 req/min per IP — general API traffic
# api_auth   : 5 req/min per IP  — login / password-reset endpoints
#
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=5r/m;

# Return 429 (RFC 6585) instead of nginx default 503 when a limit is hit
limit_req_status 429;

# ── CORS origin allowlist map ──────────────────────────────────────────────────
# Reflects the origin back only if it is in the allowed list.
# Mobile native apps (Flutter) do not send an Origin header, so $http_origin is
# empty for them — no CORS header is set, which is correct for native clients.
#
map $http_origin $cors_origin {
    "https://nexus.sadcpf.org"    $http_origin;
    "http://localhost:3000"        $http_origin;
    "http://localhost:8000"        $http_origin;
    "~^http://127\.0\.0\.1(:\d+)?$" $http_origin;
    "~^http://localhost(:\d+)?$"    $http_origin;
    default                         "";
}
