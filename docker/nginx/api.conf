server {
    listen 80;
    server_name _;
    root /var/www/api/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 50M;

    # ── Rate limiting — general API traffic ─────────────────────────────────────
    # Applied at server level; auth location below adds a tighter second limit.
    limit_req zone=api_global burst=30 nodelay;

    # ── Auth endpoints — tight rate limit (layered on top of api_global) ────────
    # Applies to login, logout, password-reset, register, etc.
    location ~ ^/api/v1/auth {
        limit_req zone=api_auth burst=3 nodelay;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Requested-With, X-XSRF-TOKEN' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age '86400' always;
            add_header Content-Length 0;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # When PHP-FPM is down, return CORS headers so the browser can read the error.
    # Use 503 (not 502) to distinguish gateway-down from app errors.
    error_page 502 503 @backend_down;
    location @backend_down {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-XSRF-TOKEN" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Content-Type                     "application/json" always;
        return 503 '{"message":"Service temporarily unavailable. Please try again in a moment."}';
    }

    # ── CORS preflight: handle entirely in nginx, never reaches PHP-FPM ─────────
    # This prevents CORS failures when PHP-FPM is restarting (code hot-reload).
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, Origin, X-Requested-With, X-XSRF-TOKEN' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age '86400' always;
            add_header Content-Length 0;
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
