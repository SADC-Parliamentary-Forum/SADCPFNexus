name: sadcpf_nexus
description: SADC Parliamentary Forum Nexus Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3+1

  # Local auth (biometric)
  local_auth: ^2.3.0

  # Offline storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # JSON serialization
  json_annotation: ^4.8.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # UI utilities
  cached_network_image: ^3.3.1
  intl: ^0.19.0

  # Icons (Material)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PublicSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PublicSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PublicSans-Bold.ttf
          weight: 700
