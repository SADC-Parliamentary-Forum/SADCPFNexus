networks:
  sadcpf:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sadcpf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sadcpfnexus}
      POSTGRES_USER: ${DB_USERNAME:-sadcpf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      sadcpf:
        ipv4_address: 10.20.30.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sadcpf} -d ${DB_DATABASE:-sadcpfnexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sadcpf_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    networks:
      sadcpf:
        ipv4_address: 10.20.30.3
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sadcpf_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sadcpfminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123456}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-19001}:9001"
    networks:
      sadcpf:
        ipv4_address: 10.20.30.5
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: sadcpf_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    networks:
      sadcpf:
        ipv4_address: 10.20.30.6
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sadcpf_php
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    # Do not use env_file here: it would inject APP_KEY= empty at start and override
    # the key written by entrypoint key:generate. Laravel reads .env from the volume.
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=10.20.30.2
      - REDIS_HOST=10.20.30.3
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - SESSION_DRIVER=redis
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    networks:
      sadcpf:
        ipv4_address: 10.20.30.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sadcpf_queue
    restart: unless-stopped
    working_dir: /var/www/api
    environment:
      - CONTAINER_ROLE=worker
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=10.20.30.2
      - REDIS_HOST=10.20.30.3
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - SESSION_DRIVER=redis
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./api:/var/www/api
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      sadcpf:
        ipv4_address: 10.20.30.10
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: sadcpf_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      sadcpf:
        ipv4_address: 10.20.30.8
    depends_on:
      php:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile
      target: dev
    container_name: sadcpf_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      sadcpf:
        ipv4_address: 10.20.30.9
