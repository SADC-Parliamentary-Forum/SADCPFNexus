<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PIF: General Info &amp; Venue</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80", // Emerald Green
                        "primary-dark": "#0ea659", 
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                        "surface-dark": "#1c2e24",
                        "surface-border": "#2d4538",
                        "text-muted": "#9db9ab",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #102219;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d4538;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex justify-center overflow-x-hidden">
<!-- Mobile Container -->
<div class="w-full max-w-md bg-background-light dark:bg-background-dark shadow-2xl min-h-screen flex flex-col relative">
<!-- Sticky Header -->
<header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-surface-border">
<div class="flex items-center justify-between p-4 pb-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 transition-colors text-white">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center font-display">New PIF</h2>
<button class="flex items-center justify-end">
<span class="text-primary text-sm font-bold tracking-wide uppercase hover:text-primary/80 transition-colors">Save Draft</span>
</button>
</div>
<!-- Progress Stepper -->
<div class="px-6 py-4">
<div class="flex items-center justify-between relative">
<!-- Progress Line Background -->
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-surface-border -z-10 transform -translate-y-1/2"></div>
<!-- Progress Line Active -->
<div class="absolute top-1/2 left-0 w-1/4 h-0.5 bg-primary -z-10 transform -translate-y-1/2 transition-all duration-300"></div>
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center ring-4 ring-background-dark shadow-lg">
<span class="text-background-dark text-xs font-bold">1</span>
</div>
<span class="text-[10px] font-medium text-primary uppercase tracking-wider">Info</span>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-dark border-2 border-surface-border flex items-center justify-center ring-4 ring-background-dark">
<span class="text-text-muted text-xs font-medium">2</span>
</div>
<span class="text-[10px] font-medium text-text-muted uppercase tracking-wider">Budget</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-dark border-2 border-surface-border flex items-center justify-center ring-4 ring-background-dark">
<span class="text-text-muted text-xs font-medium">3</span>
</div>
<span class="text-[10px] font-medium text-text-muted uppercase tracking-wider">Res</span>
</div>
<!-- Step 4 -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-dark border-2 border-surface-border flex items-center justify-center ring-4 ring-background-dark">
<span class="text-text-muted text-xs font-medium">4</span>
</div>
<span class="text-[10px] font-medium text-text-muted uppercase tracking-wider">Rev</span>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 p-4 flex flex-col gap-6 pb-24">
<!-- Section: General Information -->
<section class="flex flex-col gap-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-[20px]">info</span>
<h3 class="text-white text-lg font-bold font-display">General Information</h3>
</div>
<div class="bg-surface-dark border border-surface-border rounded-xl p-5 shadow-sm space-y-5">
<!-- Program Title -->
<label class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Program Title</span>
<div class="relative group">
<input class="form-input w-full bg-[#15201b] border-surface-border focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-white placeholder:text-text-muted h-12 px-4 transition-all" placeholder="e.g., Annual SADC Governance Summit" type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-text-muted group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit_note</span>
</div>
</div>
</label>
<!-- Strategic Objective -->
<label class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Strategic Objective</span>
<div class="relative">
<select class="form-select w-full bg-[#15201b] border-surface-border focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-white h-12 px-4 pr-10 appearance-none transition-all cursor-pointer">
<option disabled="" selected="" value="">Select an objective</option>
<option value="obj1">Enhance Legislative Frameworks</option>
<option value="obj2">Promote Regional Integration</option>
<option value="obj3">Strengthen Institutional Capacity</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[24px]">arrow_drop_down</span>
</div>
</div>
</label>
<!-- Description -->
<label class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Brief Description</span>
<textarea class="form-textarea w-full bg-[#15201b] border-surface-border focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-white placeholder:text-text-muted p-4 min-h-[100px] resize-none transition-all" placeholder="Describe the primary goals and expected outcomes..."></textarea>
</label>
</div>
</section>
<!-- Section: Venue Details -->
<section class="flex flex-col gap-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-[20px]">location_on</span>
<h3 class="text-white text-lg font-bold font-display">Venue Details</h3>
</div>
<div class="bg-surface-dark border border-surface-border rounded-xl p-5 shadow-sm space-y-5">
<!-- Venue Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Location Name</span>
<div class="relative">
<input class="form-input w-full bg-[#15201b] border-surface-border focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-white placeholder:text-text-muted h-12 px-4 transition-all" placeholder="e.g., Windhoek Convention Center" type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]">apartment</span>
</div>
</div>
</label>
<!-- Map Integration -->
<div class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Pin on Map</span>
<div class="relative w-full h-48 rounded-lg overflow-hidden border border-surface-border group cursor-pointer">
<!-- Map Image Placeholder -->
<img alt="Map view of Windhoek city center with streets and parks" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-300" data-location="Windhoek" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAY0bOL8dpVZzX4Z4DqeCUk1QNoQsbudqIcHHUqjU0zTElvXthoqknfJPSCt2eKEBToQIP60jbi-QJ8u-GS8Pl6BXExKV0BYlk36aAxGr_-iuSMl1M8wsTjU6n9M1ZtS4r6iJAMewYFGsAP19Y7L7vaQRICrDHcK1G8pkqvx-1rP5eLyJOBDI7gM3PLOjtC3EvYc_musX1XWECWTQj1qf68cRfNUUXWyagCFYRweGo-KpS5ixUc8btJNU3qPs_4mmPALCvQoiGzWHQP"/>
<!-- Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 via-transparent to-transparent"></div>
<!-- Map Pin Icon (Centered) -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-primary drop-shadow-lg animate-bounce">
<span class="material-symbols-outlined text-[40px] fill-current">location_on</span>
</div>
<!-- Controls -->
<div class="absolute bottom-3 right-3 flex gap-2">
<button class="bg-surface-dark/90 backdrop-blur text-white p-2 rounded-lg border border-surface-border hover:bg-primary hover:text-background-dark transition-all shadow-lg">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
<button class="bg-surface-dark/90 backdrop-blur text-white px-3 py-2 rounded-lg border border-surface-border text-xs font-bold hover:border-primary transition-all shadow-lg flex items-center gap-1">
                                    Change Location
                                </button>
</div>
</div>
<p class="text-xs text-text-muted px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">check_circle</span>
                            Coordinates: -22.5609° S, 17.0658° E
                        </p>
</div>
<!-- Room/Hall Details -->
<label class="flex flex-col gap-2">
<span class="text-slate-300 text-sm font-medium font-display">Meeting Hall / Room Number</span>
<input class="form-input w-full bg-[#15201b] border-surface-border focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-white placeholder:text-text-muted h-12 px-4 transition-all" placeholder="e.g., Hall A, Room 304" type="text"/>
</label>
</div>
</section>
</main>
<!-- Floating Action Button Area / Bottom Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-background-dark/90 backdrop-blur-xl border-t border-surface-border p-4 z-50">
<div class="flex items-center gap-4">
<button class="flex-1 h-14 rounded-xl bg-surface-dark border border-surface-border text-white font-bold text-base hover:bg-surface-border transition-all">
                    Cancel
                </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-background-dark font-bold text-base shadow-[0_0_15px_rgba(19,236,128,0.3)] hover:shadow-[0_0_25px_rgba(19,236,128,0.5)] hover:bg-[#3bfba0] transition-all flex items-center justify-center gap-2 group">
                    Next Step
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Home Indicator Safe Area -->
<div class="h-1 w-full"></div>
</div>
</div>
</body></html>
